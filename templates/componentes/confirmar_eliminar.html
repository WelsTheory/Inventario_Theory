{% extends "base.html" %}
{% block title %}Eliminar componente{% endblock %}
{% block nav_componentes %}active{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5">
    <div class="card border-danger">
      <div class="card-header bg-danger text-white">
        <i class="bi bi-exclamation-triangle me-2"></i>Confirmar eliminación
      </div>
      <div class="card-body">
        <p>¿Seguro que quieres eliminar <strong>{{ componente }}</strong>?</p>
        <form method="post" class="d-flex gap-2 mt-3">
          {% csrf_token %}
          <button type="submit" class="btn btn-danger">Sí, eliminar</button>
          <a href="{% url 'componentes:lista' %}" class="btn btn-outline-secondary">Cancelar</a>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
