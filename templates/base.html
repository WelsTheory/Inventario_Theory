<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Inventario Theory{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <style>
    body { background-color: #0d1117; color: #c9d1d9; }

    /* Tipografía minimalista */
    h2, h3, h4 { font-weight: 600; }
    h2 { font-size: 1.25rem; }
    h3 { font-size: 1.1rem; }
    h4 { font-size: 1rem; }

    /* Navbar */
    .navbar { background-color: #161b22 !important; border-bottom: 1px solid #30363d; padding-top: .5rem; padding-bottom: .5rem; }
    .navbar-brand { color: #58a6ff !important; font-weight: 600; font-size: 1rem; }
    .nav-link { color: #8b949e !important; font-size: .9rem; }
    .navbar-toggler { border-color: #30363d; }
    .navbar-toggler-icon { background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 30 30'%3e%3cpath stroke='%2358a6ff' stroke-linecap='round' stroke-miterlimit='10' stroke-width='2' d='M4 7h22M4 15h22M4 23h22'/%3e%3c/svg%3e"); }
    .nav-link:hover, .nav-link.active { color: #58a6ff !important; }

    /* Dashboard */
    .dashboard-search { max-width: 480px; margin: 8vh auto 0; text-align: center; }
    .add-option { color: #c9d1d9; transition: border-color .15s ease; }
    .add-option:hover { border-color: #58a6ff; }
    .add-option i { color: #58a6ff; }

    /* Cards */
    .card { background-color: #161b22; border: 1px solid #30363d; color: #c9d1d9; }
    .card-header { background-color: #21262d; border-bottom: 1px solid #30363d; color: #c9d1d9; }
    .card-body { color: #c9d1d9; }

    /* Badges */
    .badge-finalizado { background-color: #238636; }
    .badge-en-curso { background-color: #da3633; }

    /* Botones */
    .btn-primary { background-color: #238636; border-color: #238636; }
    .btn-primary:hover { background-color: #2ea043; border-color: #2ea043; }
    .btn-outline-secondary { color: #8b949e; border-color: #30363d; }
    .btn-outline-secondary:hover { background-color: #21262d; color: #c9d1d9; border-color: #8b949e; }

    /* Formularios */
    label, .form-label { color: #c9d1d9; }
    .form-check-label { color: #c9d1d9; }
    .form-text { color: #8b949e; }
    .form-control, .form-select { background-color: #0d1117; border-color: #30363d; color: #c9d1d9; }
    .form-control:focus, .form-select:focus { background-color: #0d1117; border-color: #58a6ff; color: #c9d1d9; box-shadow: 0 0 0 0.2rem rgba(88,166,255,.15); }
    .form-control::placeholder { color: #484f58; }
    .form-control:disabled, .form-select:disabled { background-color: #161b22; color: #8b949e; }
    select option { background-color: #161b22; color: #c9d1d9; }
    .input-group-text { background-color: #21262d; border-color: #30363d; color: #8b949e; }

    /* Tablas */
    .table { color: #c9d1d9; --bs-table-color: #c9d1d9; --bs-table-bg: transparent; --bs-table-border-color: #30363d; }
    .table thead th { color: #8b949e; border-color: #30363d; font-weight: 600; font-size: 0.85rem; text-transform: uppercase; letter-spacing: .04em; }
    .table tbody td { border-color: #30363d; color: #c9d1d9; }
    .table-hover tbody tr:hover { background-color: #21262d; --bs-table-accent-bg: #21262d; color: #c9d1d9; }

    /* Breadcrumb */
    .breadcrumb { --bs-breadcrumb-divider-color: #484f58; }
    .breadcrumb-item { color: #8b949e; }
    .breadcrumb-item.active { color: #c9d1d9; }
    .breadcrumb-item + .breadcrumb-item::before { color: #484f58; }

    /* List group */
    .list-group-item { background-color: #161b22; border-color: #30363d; color: #c9d1d9; }
    .list-group-item.bg-transparent { background-color: transparent !important; }

    /* Misc */
    .tipo-badge { font-size: 0.7rem; }
    a { color: #58a6ff; }
    a:hover { color: #79c0ff; }
    .text-muted { color: #8b949e !important; }
    hr { border-color: #30363d; }
    code { color: #79c0ff; background-color: #161b22; padding: 0.1em 0.4em; border-radius: 4px; }
  </style>
</head>
<body>

<nav class="navbar navbar-expand-lg">
  <div class="container-fluid">
    <a class="navbar-brand" href="{% url 'core:dashboard' %}">
      <i class="bi bi-cpu-fill me-2"></i>Inventario Theory
    </a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item">
          <a class="nav-link {% block nav_inicio %}{% endblock %}" href="{% url 'core:dashboard' %}">
            <i class="bi bi-house me-1"></i>Inicio
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% block nav_placas %}{% endblock %}" href="{% url 'placas:lista' %}">
            <i class="bi bi-motherboard me-1"></i>Placas
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% block nav_componentes %}{% endblock %}" href="{% url 'componentes:lista' %}">
            <i class="bi bi-boxes me-1"></i>Componentes
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% block nav_agregar %}{% endblock %}" href="{% url 'core:agregar' %}">
            <i class="bi bi-plus-lg me-1"></i>Agregar
          </a>
        </li>
      </ul>
    </div>
  </div>
</nav>

<div class="container-fluid py-3">
  {% if messages %}
    <div class="row">
      <div class="col">
        {% for message in messages %}
          <div class="alert alert-{{ message.tags|default:'success' }} alert-dismissible fade show" role="alert">
            {{ message }}
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
          </div>
        {% endfor %}
      </div>
    </div>
  {% endif %}

  {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
{% block extra_js %}{% endblock %}
</body>
</html>
